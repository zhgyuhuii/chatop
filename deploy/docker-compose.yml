# docker-compose.yml — 察元 AI 工舱 (chatop)
# 用法：保存本文件 → 改掉登录密码（VNC_PW 那行）→ docker compose up -d → 浏览器打开 https://<服务器IP>:6901
# 想开第二间工舱：复制一份，改 name / container_name / 端口即可。
name: chatop-ai              # 固定项目名，换目录也复用同一数据卷

services:
  chatop:
    # 海外 / 通用：Docker Hub
    image: cmdbird/chatop:latest
    # 国内更快 —— 阿里云 ACR（把上一行注释掉、用这一行）：
    # image: crpi-4i9j7th8clu2wz0j.cn-beijing.personal.cr.aliyuncs.com/cmdbird/chatop:latest
    container_name: chatop
    restart: unless-stopped
    pull_policy: always        # 每次 up 自动拉最新（:latest）
    shm_size: 1gb              # Chrome 需要，给小了会崩
    ports:
      - "6901:7443"            # 唯一对外端口 → 容器内 Caddy（HTTPS + 统一鉴权）
    environment:
      LOGIN_USER: admin
      # 必改：登录密码。只改这一处（下面 FILES_PW 用 YAML 锚点自动跟随）。
      # 说明：镜像读的是 VNC_PW / FILES_PW，不是 PASSWORD；KasmVNC 启动会清掉 VNC_PW，
      #       app-manager 另读一份不被清的 FILES_PW，二者必须一致，锚点保证同步。
      VNC_PW: &pw "换成你自己的强密码"
      FILES_PW: *pw
      CLIPBOARD_IN: "true"            # 外 → 内 粘贴
      CLIPBOARD_OUT: "true"           # 内 → 外 复制
      FILES_UPLOAD: "true"
      FILES_DOWNLOAD: "true"
      CHATOP_LICENSE_HMAC_KEY: ""     # 留空 = 关闭序列号闸门
    volumes:
      - chatop-home:/home/admin       # 家目录：智能体配置/密钥/工作区/已装应用

volumes:
  chatop-home:
