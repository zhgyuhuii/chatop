<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="OpenClaw lobster">
  <!-- 类似 🦞 的清晰矢量小龙虾：红橙色身体、双钳、分段尾、圆眼 -->
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF7043"/>
      <stop offset="100%" style="stop-color:#E64A19"/>
    </linearGradient>
  </defs>
  <!-- 左钳 -->
  <ellipse cx="14" cy="32" rx="10" ry="14" fill="url(#claw)" stroke="#BF360C" stroke-width="1.5"/>
  <ellipse cx="14" cy="32" rx="6" ry="9" fill="#FFAB91"/>
  <!-- 右钳 -->
  <ellipse cx="50" cy="32" rx="10" ry="14" fill="url(#claw)" stroke="#BF360C" stroke-width="1.5"/>
  <ellipse cx="50" cy="32" rx="6" ry="9" fill="#FFAB91"/>
  <!-- 身体（椭圆） -->
  <ellipse cx="32" cy="34" rx="16" ry="12" fill="url(#body)" stroke="#B71C1C" stroke-width="1.5"/>
  <!-- 尾巴分段 -->
  <ellipse cx="32" cy="48" rx="12" ry="6" fill="url(#body)" stroke="#B71C1C" stroke-width="1.2"/>
  <path d="M22 44 Q32 42 42 44" fill="none" stroke="#B71C1C" stroke-width="1.2"/>
  <path d="M24 48 Q32 46 40 48" fill="none" stroke="#B71C1C" stroke-width="1"/>
  <!-- 眼睛（白底黑瞳，清晰圆眼） -->
  <circle cx="26" cy="28" r="5" fill="#FFF" stroke="#37474F" stroke-width="1"/>
  <circle cx="38" cy="28" r="5" fill="#FFF" stroke="#37474F" stroke-width="1"/>
  <circle cx="26" cy="28" r="2.5" fill="#263238"/>
  <circle cx="38" cy="28" r="2.5" fill="#263238"/>
  <!-- 触须（细线） -->
  <path d="M24 22 Q16 14 12 10" fill="none" stroke="#C62828" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40 22 Q48 14 52 10" fill="none" stroke="#C62828" stroke-width="1.5" stroke-linecap="round"/>
</svg>
