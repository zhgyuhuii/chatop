network:
  ssl:
    pem_certificate: ${HOME}/.vnc/self.pem
    pem_key: ${HOME}/.vnc/self.pem
  udp:
    public_ip: 127.0.0.1
# === 桌面编码默认（服务端兜底：非浏览器客户端 + 浏览器首次同步前生效）===
# 「均衡」档：加宽自适应画质区间。默认是 min7/max8 区间太窄——运动时压得不够狠(不跟手)、
# 静止时又没榨到最清晰。这里 min5/max9：运动(高变化)时降到 5 更流畅，静止时升到 9 更清晰。
# quality 刻度 0-9，高=画质好；max_quality 用于画面静止、min_quality 用于高速变化时自动降质。
# rectangle_compress_threads: 0 = 按 CPU 核数并行压缩（吃满多核 → 帧率更高）。
# 注意：noVNC 前端(index.html Stream Quality 面板)连上后会用客户端设置覆盖本段，终端用户可实时改。
encoding:
  max_frame_rate: 60
  rect_encoding_mode:
    min_quality: 5
    max_quality: 9
    rectangle_compress_threads: 0

runtime_configuration:
  allow_override_standard_vnc_server_settings: true
  allow_override_list:
    - pointer.enabled
server:
  # ↓ 这行是 CLIPBOARD_IN / CLIPBOARD_OUT 能生效的【必要条件】，删了开关会静默失效（见下）。
  allow_environment_variables_to_override_config_settings: true

# === 剪贴板方向开关 ===
# 真值在这里，不在命令行。vncserver 是个 perl 包装脚本，它把本文件的配置经
# ConfigToCmd() 派生成 CLI 参数、追加在 vnc_startup.sh 自己拼的参数【之后】，
# 而 Xvnc 是后到者胜 —— 所以往命令行前面塞 -SendCutText=0 会被本文件静默盖掉。
# 实测(2026-07-16)：CLIPBOARD_OUT=0 时 vncconfig -get SendCutText 仍返回 1，
# 即开关整整一段时间形同虚设。故 Dockerfile 改走 KVNC_* 环境变量覆盖本配置。
data_loss_prevention:
  clipboard:
    server_to_client:    # 桌面 → 浏览器（把东西复制出去）；由 CLIPBOARD_OUT 覆盖
      enabled: true
    client_to_server:    # 浏览器 → 桌面（把东西粘贴进来）；由 CLIPBOARD_IN 覆盖
      enabled: true
