services:
  chatop-ai:
    build:
      context: .
      args:
        VERSION: ${VERSION:-1.0.0}
        # 自定义系统用户名（kasm-user 改名为此值；右上角/home 目录/文件管理器都显示它）
        APP_USER: ${LOGIN_USER:-admin}
    image: chatop-ai:${VERSION:-1.0.0}
    container_name: chatop-ai
    environment:
      - VNC_PW=${PASSWORD:?请在 .env 设置 PASSWORD}
      - LOGIN_USER=${LOGIN_USER:-admin}
      # 独立给 filebrowser/Caddy 用：KasmVNC vnc_startup 会 unset VNC_PW，故另传一份不被清的密码
      - FILES_PW=${PASSWORD:?请在 .env 设置 PASSWORD}
      # 文件传输权限（app-manager /apps/files/*）：1 开放 / 0 关闭
      - FILES_UPLOAD=${FILES_UPLOAD:-1}
      - FILES_DOWNLOAD=${FILES_DOWNLOAD:-1}
      # 上传目标 / 下载来源目录（默认用户桌面）
      - FILES_DIR=${FILES_DIR:-/home/kasm-user/Desktop}
    ports:
      # 单一对外端口 → 容器内 Caddy(7443)；Caddy 再反代 KasmVNC(6901) 与 filebrowser(8585)。
      # KasmVNC 的 6901 与 filebrowser 的 8585 仅容器内可达，不再对外发布。
      - "${PORT:-6901}:7443"
    shm_size: "1gb"
    volumes:
      - chatop-home:/home/kasm-user
    restart: unless-stopped

volumes:
  chatop-home:
