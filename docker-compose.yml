# =============================================================================
# 察元AI (Custom Selkies) - 构建与运行
# 使用：docker compose up -d --build
# 可选：cp env.example .env 并修改，用于覆盖下方默认值
# 镜像版本：由根目录 VERSION 文件控制（默认与 ${VERSION} 同步），每次发布 +1
# 推荐用 ./build-and-run.sh，它会自动读取 VERSION 并打 chatop:<版本> 与 chatop:latest
# =============================================================================

services:
  chatop:
    # 可选：创建 .env 文件（参考 env.example），用于覆盖下方变量
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-}
    image: chatop:${VERSION:-1.0.0}
    container_name: chatop

    # -------------------------------------------------------------------------
    # 察元AI 用户与权限
    # -------------------------------------------------------------------------
    environment:
      # 用户/组 ID，用于卷权限映射，执行 id 命令查看当前用户
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
      # 页面标题
      - TITLE=${TITLE:-察元AI}
      # 新建文件默认权限 (可选)
      # - UMASK=022

      # -----------------------------------------------------------------------
      # HTTP 认证（察元AI / Selkies 共用）
      # 强制要求设置 PASSWORD：未在 .env 设置则 compose 拒绝启动，
      # 避免弱口令/空认证暴露在对外端口 3001（PASSWORD 同时是 root/abc 的 su 密码）
      # -----------------------------------------------------------------------
      - CUSTOM_USER=${CUSTOM_USER:-admin}
      - PASSWORD=${PASSWORD:?请在 .env 中设置强密码 PASSWORD，参考 env.example}
      - CUSTOM_HOSTNAME=${CUSTOM_HOSTNAME:-chatop}
      # 使用 secrets：- FILE__PASSWORD=/run/secrets/chatop_password

      # -----------------------------------------------------------------------
      # Selkies 界面与功能
      # -----------------------------------------------------------------------
      - DASHBOARD=${DASHBOARD:-selkies-dashboard}
      # 仪表盘: selkies-dashboard | selkies-dashboard-zinc | selkies-dashboard-wish
      - FILE_MANAGER_PATH=${FILE_MANAGER_PATH:-/config/Desktop}
      # 上传/下载默认路径
      - SELKIES_UI_TITLE=${SELKIES_UI_TITLE:-察元AI}
      # 侧边栏标题，可在 .env 中配置
      - SELKIES_UI_SHOW_SIDEBAR=true
      - SELKIES_UI_SHOW_LOGO=true
      # 文件传输：upload,download 或 "" 禁用
      - SELKIES_FILE_TRANSFERS=download
      # 剪贴板同步
      - SELKIES_CLIPBOARD_ENABLED=true
      - SELKIES_CLIPBOARD_IN_ENABLED=false
      - SELKIES_CLIPBOARD_OUT_ENABLED=true
      # 麦克风
      - SELKIES_MICROPHONE_ENABLED=true
      # 手柄
      - SELKIES_GAMEPAD_ENABLED=true

      # -----------------------------------------------------------------------
      # 安全加固（按需启用）
      # HARDEN_DESKTOP=true 会禁用 sudo、终端、xdg-open 等
      # -----------------------------------------------------------------------
      # - HARDEN_DESKTOP=false
      # - HARDEN_OPENBOX=false
      # - DISABLE_SUDO=false
      # - DISABLE_TERMINALS=false
      # - DISABLE_OPEN_TOOLS=false
      # - DISABLE_CLOSE_BUTTON=false
      # - DISABLE_MOUSE_BUTTONS=false
      # - HARDEN_KEYBINDS=false

      # -----------------------------------------------------------------------
      # 语言与端口
      # -----------------------------------------------------------------------
      - LC_ALL=${LC_ALL:-zh_CN.UTF-8}
      # - CUSTOM_PORT=3000
      # - CUSTOM_HTTPS_PORT=3001
      # - CUSTOM_WS_PORT=8082

      # -----------------------------------------------------------------------
      # GPU 加速（可选）
      # -----------------------------------------------------------------------
      # - PIXELFLUX_WAYLAND=true
      # - DRI_NODE=/dev/dri/renderD128
      # - DRINODE=/dev/dri/renderD128

    hostname: ${CUSTOM_HOSTNAME:-chatop}
    # 设置 hostname 避免显示容器 ID（如 abc@3579d035063d），改为 admin@chatop

    ports:
      - "3001:3001"
    volumes:
      - chatop-config:/config
      # 自定义 logo 运行时覆盖（二选一，需文件存在）：
      # - ./logo.png:/custom-logo/logo.png:ro
      # - ./assets:/custom-logo:ro
    shm_size: "1gb"
    restart: unless-stopped

    # GPU 直通示例（Intel/AMD）
    # devices:
    #   - /dev/dri:/dev/dri

volumes:
  chatop-config:
